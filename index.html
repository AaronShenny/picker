<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>picker</title>
    <script>
      // GitHub Pages SPA redirect restore.
      // The 404.html encodes the deep-link path into ?p=... query param.
      // This script restores it so React Router sees the correct route.
      (function () {
        var qs = window.location.search;
        if (qs) {
          var params = {};
          qs.slice(1).split('&').forEach(function (p) {
            var kv = p.split('=');
            params[decodeURIComponent(kv[0])] = kv.slice(1).join('=');
          });
          if (params.p !== undefined) {
            var base = window.location.pathname.split('/').slice(0, 2).join('/'); // /picker
            var path = base + '/' + (params.p ? decodeURIComponent(params.p) : '');
            var query = params.q ? '?' + decodeURIComponent(params.q) : '';
            window.history.replaceState(null, null, path + query + window.location.hash);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
