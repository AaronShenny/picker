<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>picker</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When a user refreshes /picker/students, GitHub Pages serves this 404.html.
      // We encode the full path into the query string and redirect to the app root,
      // which then restores the path via the script in index.html.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + // keep /picker
        '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&q=' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
